name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group build --frozen

      - name: Build Windows app with Nuitka
        shell: pwsh
        run: .\nuitka-built.ps1 -Jobs 2

      - name: Package PCST.dist
        shell: pwsh
        run: |
          $distRoot = "dist\nuitka"
          if (-not (Test-Path $distRoot)) {
            throw "Nuitka output root not found: $distRoot"
          }

          Write-Host "Nuitka output directories:"
          Get-ChildItem -Path $distRoot -Directory | Select-Object -ExpandProperty FullName

          $preferredDistPath = Join-Path $distRoot "PCST.dist"
          if (Test-Path $preferredDistPath) {
            $distPath = (Resolve-Path $preferredDistPath).Path
          }
          else {
            $distDirs = @(Get-ChildItem -Path $distRoot -Directory -Filter "*.dist")
            if ($distDirs.Count -ne 1) {
              throw "Expected exactly one Nuitka .dist directory under $distRoot, found $($distDirs.Count)."
            }

            Rename-Item -LiteralPath $distDirs[0].FullName -NewName "PCST.dist"
            $distPath = (Resolve-Path $preferredDistPath).Path
          }

          $exePath = Join-Path $distPath "PCST.exe"
          if (-not (Test-Path $exePath)) {
            throw "PCST.exe not found in Nuitka output: $distPath"
          }

          New-Item -ItemType Directory -Force -Path release | Out-Null
          Compress-Archive `
            -Path $distPath `
            -DestinationPath "release\PCST-${{ github.ref_name }}-windows.zip" `
            -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: release/*.zip
