name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --group build --frozen

      - name: Build Windows app with Nuitka
        shell: pwsh
        run: .\nuitka-built.ps1 -Jobs 2

      - name: Package PCST.dist
        shell: pwsh
        run: |
          zip -r PCViewer-${{ github.ref_name }}-source.zip . \
            -x ".git/*" -x ".github/*" -x ".venv/*" -x ".ruff_cache/*" -x "__pycache__/*" -x "*.pyc" -x "uv.lock" -x "logs/*" -x "data/*"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: release/*.zip
